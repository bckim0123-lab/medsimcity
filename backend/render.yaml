services:
  - type: web
    name: medisim-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false          # Render 대시보드에서 직접 입력 (Vercel URL)
      - key: HIRA_SERVICE_KEY
        sync: false          # data.go.kr 인증키
    healthCheckPath: /health
